# ---------------------------------------------------------------------------
# Machine Learning Model Parameters
# ---------------------------------------------------------------------------
model:
  # Primary algorithm
  algorithm: "xgboost"

  # XGBoost hyperparameters
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    use_label_encoder: false
    eval_metric: "logloss"
    random_state: 42

  # LightGBM hyperparameters (alternative)
  lightgbm:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    num_leaves: 31
    random_state: 42
    verbose: -1

  # Cross-validation settings
  cross_validation:
    strategy: "stratified_kfold"
    n_splits: 5
    shuffle: true
    random_state: 42

# ---------------------------------------------------------------------------
# KPI Benchmark Targets
# ---------------------------------------------------------------------------
kpi_benchmarks:
  churn_rate_target_pct: 15.0
  csat_target: 4.0
  ltv_cac_ratio_target: 3.0
  retention_rate_target_pct: 85.0
  nrr_target_pct: 100.0

# ---------------------------------------------------------------------------
# SHAP Explainability Parameters
# ---------------------------------------------------------------------------
explainability:
  top_n_features: 10
  shap_sample_size: 500

# ---------------------------------------------------------------------------
# Risk Tier Classification Thresholds
# ---------------------------------------------------------------------------
risk_tiers:
  high_risk_threshold: 0.70
  medium_risk_threshold: 0.40
  # Low risk: probability < medium_risk_threshold
