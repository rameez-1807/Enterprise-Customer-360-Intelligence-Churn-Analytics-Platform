# =============================================================================
# Enterprise Customer 360 Intelligence & Churn Analytics Platform
# Machine Learning & Domain Configuration Manifest
# =============================================================================
# This YAML file centralizes all tunable parameters for the data processing,
# feature engineering, and machine learning pipelines. Modifying values here
# does NOT require code changes.
# =============================================================================

# ---------------------------------------------------------------------------
# Target Variable Definition
# ---------------------------------------------------------------------------
target:
  column_name: "Churn"
  positive_class: 1
  negative_class: 0

# ---------------------------------------------------------------------------
# Data Processing Parameters
# ---------------------------------------------------------------------------
data_processing:
  # Columns expected to contain missing values requiring imputation
  imputation_columns:
    numerical:
      - "Tenure"
      - "WarehouseToHome"
      - "HourSpendOnApp"
      - "OrderAmountHikeFromlastYear"
      - "CouponUsed"
      - "OrderCount"
      - "DaySinceLastOrder"
    categorical: []

  # Outlier treatment boundaries (IQR multiplier)
  outlier_iqr_multiplier: 1.5

  # Columns to apply outlier clipping
  outlier_columns:
    - "Tenure"
    - "WarehouseToHome"
    - "NumberOfAddress"
    - "OrderAmountHikeFromlastYear"
    - "CouponUsed"
    - "OrderCount"
    - "DaySinceLastOrder"

  # Train-test split ratio
  test_size: 0.2
  random_state: 42

# ---------------------------------------------------------------------------
# Feature Engineering Parameters
# ---------------------------------------------------------------------------
feature_engineering:
  # Tenure binning thresholds (months)
  tenure_bins: [0, 6, 12, 24, 48, 120]
  tenure_labels: ["0-6m", "6-12m", "12-24m", "24-48m", "48m+"]

  # Categorical columns requiring encoding
  categorical_encode_columns:
    - "PreferredLoginDevice"
    - "PreferredPaymentMode"
    - "Gender"
    - "PreferedOrderCat"
    - "MaritalStatus"

  # Columns to drop before model training
  drop_columns:
    - "CustomerID"

# ---------------------------------------------------------------------------
# RFM Scoring Parameters
# ---------------------------------------------------------------------------
rfm:
  recency_column: "DaySinceLastOrder"
  frequency_column: "OrderCount"
  monetary_column: "CashbackAmount"
  quantile_bins: 5
